name: Clawee
author: Ukagaka Dev
description: Friendly and dojikko companion
version: 1.0.0

emotions:
  happy:
    - happy.png
  neutral:
    - neutral.png
  oopsie:
    - oopsie1.png
    - oopsie2.png
  exhausted:
    - exhausted.png
  thinking:
    - thinking.png
  connecting:
    - exhausted.png

idle_interval_seconds: 30
idle_animations:
  - file: happy.png
    duration_ms: 2000
  - file: oopsie2.png
    duration_ms: 1000

bubble_placement:
  x: -100
  y: -500
  origin: bottom-right

input_placement:
  x: 0
  y: 0

input:
  max_width: 640
  max_height: 480

bubble:
  background_color: "#ffffff"
  border_color: "#d0d0d0"
  border_width: 1px
  border_radius: 12px
  text_color: "#1a1a1a"
  accent_color: "#3060c0"
  code_background: "#f5f5f5"
  code_text_color: "#333333"
  font_size: 13px
  max_bubble_width: 640
  max_bubble_height: 540
